<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/css/autoComplete.min.css"
    />
    <link rel="stylesheet" href="/global.css" />
    <title>animal dictionary</title>
  </head>
  <body class="word-page">
    <div>
      <h2>動物病気百科</h2>
    </div>
    <div class="word-page-header">
      <div class="search">
        <form id="search-form">
          <div class="autoComplete_wrapper">
            <input
              id="autoComplete"
              type="search"
              dir="ltr"
              spellcheck="false"
              autocorrect="off"
              autocomplete="off"
              autocapitalize="off"
            />
          </div>
        </form>
      </div>
      <h1 class="word-page-title">病名: {{ word }}</h1>
    </div>
    {{ description | safe }}
    <script src="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/autoComplete.js"></script>
    <script src="/search-form.js"></script>
  </body>
</html>
